---
# vars file for netbox
netbox_dir: /opt/netbox
netbox_python: /usr/bin/python3.13

netbox_packages:
  - postgresql-17
  - redis-server
  - nginx
  - python3
  - python3-pip
  - python3-venv
  - python3-dev
  - python3-psycopg2
  - build-essential
  - libxml2-dev
  - libxslt1-dev
  - libffi-dev
  - libpq-dev
  - libssl-dev
  - zlib1g-dev
  - git
