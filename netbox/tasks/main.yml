---
# tasks file for netbox
# This playbook has been tested on
#PRETTY_NAME="Debian GNU/Linux 13 (trixie)"
#VERSION_CODENAME=trixie
#DEBIAN_VERSION_FULL=13.2
- name: Install required system packages
  package:
    name: "{{ netbox_packages }}"
    state: present

- name: Ensure PostgreSQL service is running
  service:
    name: postgresql
    state: started
    enabled: true

- name: Create NetBox database user
  become_user: postgres
  community.postgresql.postgresql_user:
    name: netbox
    password: "{{ netbox_db_user_password }}"
    state: present

- name: Create NetBox database
  become_user: postgres
  community.postgresql.postgresql_db:
    name: netbox
    owner: netbox
    state: present

- name: Allow NetBox to create tables in public schema
  become_user: postgres
  community.postgresql.postgresql_privs:
    database: netbox
    type: schema
    objs: public
    roles: netbox
    privs: CREATE
    state: present

- name: Ensure Redis service is running
  service:
    name: redis-server
    state: started
    enabled: true

- name: Verify Redis is responding
  command: redis-cli ping
  register: redis_status
  changed_when: false
  failed_when: redis_status.stdout != "PONG"

- name: Create NetBox system user
  user:
    name: netbox
    system: true
    shell: /usr/sbin/nologin
    create_home: true

- name: Clone NetBox repository
  git:
    repo: https://github.com/netbox-community/netbox.git
    dest: "{{ netbox_dir }}"
    version: v4.5.4
    single_branch: true
    update: false

- name: Ensure NetBox directories exist
  file:
    path: "{{ item }}"
    state: directory
    owner: netbox
    group: netbox
    mode: "0755"
  loop:
    - "{{ netbox_dir }}/netbox/media"
    - "{{ netbox_dir }}/netbox/reports"
    - "{{ netbox_dir }}/netbox/scripts"

- name: Deploy NetBox configuration
  template:
    src: configuration.py.j2
    dest: "{{ netbox_dir }}/netbox/netbox/configuration.py"
    owner: netbox
    group: netbox
  notify: Restart netbox services

- name: Run NetBox upgrade script
  command: "{{ netbox_dir }}/upgrade.sh"
  args:
    chdir: "{{ netbox_dir }}"
    # creates: may block migrations if previously failed
    creates: "{{ netbox_dir }}/venv/bin/python"
  environment:
    PYTHON: "{{ netbox_python }}"

- name: Create NetBox superuser
  become_user: netbox
  command: >
    {{ netbox_dir }}/venv/bin/python
    {{ netbox_dir }}/netbox/manage.py createsuperuser
    --noinput
    --username {{ netbox_superuser.username }}
    --email {{ netbox_superuser.email }}
  environment:
    DJANGO_SUPERUSER_PASSWORD: "{{ netbox_superuser.password }}"
  register: netbox_superuser_result
  changed_when: "'Superuser created successfully.' in netbox_superuser_result.stdout"
  failed_when:
    - netbox_superuser_result.rc != 0
    - "'That username is already taken' not in netbox_superuser_result.stderr"

- name: Deploy Gunicorn configuration
  template:
    src: gunicorn.py.j2
    dest: "{{ netbox_dir }}/gunicorn.py"
    owner: netbox
    group: netbox
  notify: Restart netbox services

- name: Install NetBox systemd services
  copy:
    src: "{{ item.src }}"
    dest: "/etc/systemd/system/{{ item.dest }}"
    owner: root
    group: root
    mode: "0644"
  loop:
    - { src: "netbox.service", dest: "netbox.service" }
    - { src: "netbox-rq.service", dest: "netbox-rq.service" }
  notify:
    - Reload systemd daemon
    - Enable and start netbox services

- name: Ensure nginx is running
  service:
    name: nginx
    state: started
    enabled: true

- name: Create nginx TLS directory
  file:
    path: /etc/nginx/ssl
    state: directory
    mode: "0755"

- name: Deploy TLS certificates
  copy:
    src: "{{ item.src }}"
    dest: "/etc/nginx/ssl/{{ item.src }}"
    mode: "{{ item.mode }}"
    owner: root
    group: root
  loop:
    - { src: "netbox.crt", mode: "0644" }
    - { src: "netbox.key", mode: "0400" }
  notify: Restart nginx

- name: Deploy nginx configuration
  template:
    src: nginx.conf.j2
    dest: /etc/nginx/sites-enabled/default
    owner: root
    group: root
    mode: "0644"
  notify: Restart nginx
